<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="logo">☕ Student Planner</div>
</header>

<main class="container">

  <h1>時間割</h1>

  <h2>今日の授業</h2>
  <div id="today-view"></div>

  <div class="table-container">
    <table id="timetable">
      <thead>
        <tr>
          <th></th>
          <th>月</th>
          <th>火</th>
          <th>水</th>
          <th>木</th>
          <th>金</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <h2>オンライン・オンデマンド授業</h2>

  <div id="online-section">
    <div class="input-area">
      <input type="text" id="online-subject" placeholder="授業名">
      <input type="text" id="online-memo" placeholder="メモ">
      <button id="add-online">追加</button>
    </div>
    <div id="online-list"></div>
  </div>

</main>

<!-- 時間モーダル -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h2 id="modal-title">時間設定</h2>
    <label>開始時刻</label>
    <input type="time" id="start-time">
    <label>終了時刻</label>
    <input type="time" id="end-time">
    <button id="save-time">保存</button>
  </div>
</div>

<!-- 授業編集モーダル -->
<div id="class-modal" class="modal">
  <div class="modal-content">
    <h2>授業編集</h2>

    <label>授業名</label>
    <input type="text" id="subject-input">

    <label>教室</label>
    <input type="text" id="room-input">

    <label>種別</label>
    <select id="type-input">
      <option value="">なし</option>
      <option value="required">必修</option>
      <option value="elective">選択</option>
      <option value="lab">実験</option>
    </select>

    <label>メモ</label>
    <input type="text" id="memo-input">

    <label>出席回数</label>
    <input type="number" id="attend-input" min="0">

    <label>欠席回数</label>
    <input type="number" id="absent-input" min="0">

    <button id="save-class">保存</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
