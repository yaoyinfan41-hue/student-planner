<!DOCTYPE html>
<html>
<head>
<title>時間割</title>
</head>
<body>

<h1>時間割</h1>

<button onclick="addSaturday()">土曜追加</button>
<button onclick="addSunday()">日曜追加</button>

<table border="1" id="timetable">

<tr>
<th></th>
<th>月</th>
<th>火</th>
<th>水</th>
<th>木</th>
<th>金</th>
<th class="sat" style="display:none">土</th>
<th class="sun" style="display:none">日</th>
</tr>

<script>
for(let i=1;i<=6;i++){
document.write(`
<tr>
<th>
${i}限<br>

開始
<input type="time" id="start${i}">
<br>
終了
<input type="time" id="end${i}">
</th>

<td>${cell("mon",i)}</td>
<td>${cell("tue",i)}</td>
<td>${cell("wed",i)}</td>
<td>${cell("thu",i)}</td>
<td>${cell("fri",i)}</td>

<td class="sat" style="display:none">${cell("sat",i)}</td>
<td class="sun" style="display:none">${cell("sun",i)}</td>

</tr>
`)
}

function cell(day,i){
return `
授業<input id="${day}${i}"><br>
教室<input id="${day}${i}_room"><br>

出席:
<button onclick="addAttend('${day}${i}')">+</button>
<span id="${day}${i}_attend">0</span>

欠席:
<button onclick="addAbsent('${day}${i}')">+</button>
<span id="${day}${i}_absent">0</span>

<br>
<textarea id="${day}${i}_memo" placeholder="メモ"></textarea>
`
}
</script>

</table>

<br>
<button onclick="saveTimetable()">保存</button>

<script src="script.js"></script>

</body>
</html>
