<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割</title>
</head>
<body>

<h1>時間割</h1>

<button onclick="saveTimetable()">保存</button>
<button onclick="toggleWeekend()">土日表示</button>

<br><br>

<table border="1">

<tr>
<th>時限</th>
<th>月</th>
<th>火</th>
<th>水</th>
<th>木</th>

</tr>

<tr>
<th>1限</th>
<td>授業<input id="mon1"><br>教室<input id="mon1_room"><br>
出席<button onclick="addAttend('mon1')">+</button>
<button onclick="subAttend('mon1')">-</button>
<span id="mon1_attend">0</span><br>
欠席<button onclick="addAbsent('mon1')">+</button>
<button onclick="subAbsent('mon1')">-</button>
<span id="mon1_absent">0</span><br>
<textarea id="mon1_memo"></textarea></td>
