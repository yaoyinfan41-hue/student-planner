<title>時間割</title>

<body>

<h1>時間割</h1>

<button onclick="saveTimetable()">保存</button>
<button onclick="toggleWeekend()">土日表示</button>

<br><br>

<th>火</th>
<th>水</th>

<th class="weekend" style="display:none">日</th>

<td class="weekend" style="display:none"><input id="sat1"></td>
