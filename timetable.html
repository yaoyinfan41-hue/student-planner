<title>時間割</title>

<style>

font-family:sans-serif;
}

border-collapse: collapse;
}

border:1px solid black;

}

width:90%;
}

width:90%;
height:40px;

.weekend{
display:none;

<button onclick="saveTimetable()">保存</button>
