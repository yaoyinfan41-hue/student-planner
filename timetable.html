<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>時間割</title>
</head>
<body>

<h1>時間割</h1>

<button onclick="saveTimetable()">保存</button>

<button onclick="showSat()">土曜表示</button>
<button onclick="hideSat()">土曜非表示</button>

<button onclick="showSun()">日曜表示</button>
<button onclick="hideSun()">日曜非表示</button>

<br><br>

<table border="1" id="timetable">

<tr>
<th></th>
<th>月</th>
<th>火</th>
<th>水</th>
<th>木</th>
<th>金</th>
<th class="sat" style="display:none">土</th>
<th class="sun" style="display:none">日</th>
</tr>

<script>

const days=["mon","tue","wed","thu","fri","sat","sun"];

for(let i=1;i<=6;i++){

document.write(`
<tr>

<th>
${i}限<br>
<input type="time" id="start${i}">
<br>
<input type="time" id="end${i}">
</th>

${days.map(day=>{

let cls="";
if(day==="sat") cls='class="sat" style="display:none"';
if(day==="sun") cls='class="sun" style="display:none"';

return `<td ${cls}>${cell(day,i)}</td>`

}).join("")}

</tr>
`)

}

function cell(day,i){

return `

授業<br>
<input id="${day}${i}">

<br>

教室<br>
<input id="${day}${i}_room">

<br>

出席
<button type="button" onclick="addAttend('${day}${i}')">+</button>
<button type="button" onclick="subAttend('${day}${i}')">-</button>
<span id="${day}${i}_attend">0</span>

<br>

欠席
<button type="button" onclick="addAbsent('${day}${i}')">+</button>
<button type="button" onclick="subAbsent('${day}${i}')">-</button>
<span id="${day}${i}_absent">0</span>

<br>

<textarea id="${day}${i}_memo"></textarea>

`
}

</script>

</table>

<script src="script.js"></script>

</body>
</html>
